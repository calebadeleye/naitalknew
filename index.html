    <!--
      Google Tag Manager. Container id comes from VITE_GTM_ID (Vite replaces
      %VITE_GTM_ID% with that env var's value at build/serve time). If it's
      unset, the id below is empty, gtm.js is never requested, and dataLayer
      still exists as a plain array so nothing else on the page can error.
    -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        if (!i) return;
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "%VITE_GTM_ID%");
    </script>
